# ZarishSphere FHIR R5 Engine — Default Configuration
# IMPORTANT: Never commit secrets here. Use environment variables:
#   ZS_FHIR_DATABASE_PASSWORD, ZS_FHIR_AUTH_JWT_SECRET
# In production, secrets come from HashiCorp Vault via Vault Agent Injector.

env: development
version: "1.0.0"
service_name: zs-core-fhir-engine
migrations_path: ./migrations

server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: 30s
  write_timeout: 60s

database:
  host: localhost
  port: 5432
  database: zarishsphere
  user: zs_fhir_app
  # password: SET VIA ZS_FHIR_DATABASE_PASSWORD env var
  sslmode: disable
  max_conns: 25
  min_conns: 5
  max_conn_life: 30m
  max_conn_idle: 5m
  health_check: 1m

auth:
  # Keycloak 26.5.6 OIDC issuer URL
  oidc_issuer: "http://localhost:8443/realms/zarishsphere"
  client_id: "zs-fhir-engine"
  jwks_endpoint: "http://localhost:8443/realms/zarishsphere/protocol/openid-connect/certs"
  # jwt_secret: SET VIA ZS_FHIR_AUTH_JWT_SECRET env var (development only)

fhir:
  base_path: /fhir/R5
  max_request_body_bytes: 10485760  # 10 MB
  default_page_size: 20
  max_page_size: 100
  version: "5.0.0"
  validate_on_create: false         # Enable when zs-core-fhir-validator is live
  audit_all_reads: true             # HIPAA requirement

otlp:
  endpoint: "http://localhost:4318"  # Grafana Tempo 2.7+
  insecure: true

nats:
  url: "nats://localhost:4222"       # NATS 2.12.5
  cluster_id: zarishsphere
  client_id: zs-fhir-engine
  max_reconnects: 10
  reconnect_wait: 2s
  connect_timeout: 10s
