name: CI/CD - zs-core-fhir-engine

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs on new pushes to same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26.1"
  REGISTRY: ghcr.io
  IMAGE_NAME: zarishsphere/zs-core-fhir-engine

jobs:
  # ── Code Quality ──────────────────────────────────────────────────────────
  lint:
    name: Lint (golangci-lint)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.65.0
          args: --timeout=5m

  # ── Security Scanning ─────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: GitGuardian secret scan
        uses: GitGuardian/ggshield-action@v1
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
        continue-on-error: true

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          exit-code: "1"
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: go

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: CodeQL Analyze
        uses: github/codeql-action/analyze@v3

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2

  # ── Tests ─────────────────────────────────────────────────────────────────
  test:
    name: Tests (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        go-version: ["1.26.1"]

    services:
      postgres:
        image: timescale/timescaledb:2.25-pg18
        env:
          POSTGRES_USER: zs_test
          POSTGRES_PASSWORD: zs_test_password
          POSTGRES_DB: zs_fhir_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U zs_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      nats:
        image: nats:2.12.5-alpine
        ports:
          - 4222:4222
        options: >-
          --health-cmd "nc -z localhost 4222"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Run tests (race + coverage)
        run: |
          go test ./... \
            -race \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -timeout=120s
        env:
          ZS_FHIR_DATABASE_HOST: localhost
          ZS_FHIR_DATABASE_PORT: 5432
          ZS_FHIR_DATABASE_DATABASE: zs_fhir_test
          ZS_FHIR_DATABASE_USER: zs_test
          ZS_FHIR_DATABASE_PASSWORD: zs_test_password
          ZS_FHIR_DATABASE_SSLMODE: disable
          ZS_FHIR_AUTH_JWT_SECRET: test_jwt_secret
          ZS_FHIR_ENV: test
          NATS_URL: nats://localhost:4222

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.out
          flags: unit-integration
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Enforce coverage threshold (≥70%)
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "Coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 70" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below 70%"
            exit 1
          fi

  # ── FHIR Validation ───────────────────────────────────────────────────────
  fhir-validate:
    name: FHIR R5 Validation
    runs-on: ubuntu-latest
    needs: [lint]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Download HAPI FHIR Validator
        run: |
          curl -fsSL \
            https://github.com/hapifhir/org.hl7.fhir.core/releases/latest/download/validator_cli.jar \
            -o validator_cli.jar

      - name: Validate FHIR fixtures
        run: |
          if ls tests/fixtures/fhir/*.json 1> /dev/null 2>&1; then
            java -jar validator_cli.jar \
              -version 5.0.0 \
              tests/fixtures/fhir/*.json
          else
            echo "No FHIR fixtures found — skipping"
          fi

  # ── Build Container Image ─────────────────────────────────────────────────
  build:
    name: Build & Push Container Image
    runs-on: ubuntu-latest
    needs: [test, security, fhir-validate]

    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.ref_name }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          severity: CRITICAL,HIGH
          exit-code: "1"

  # ── Helm Lint ─────────────────────────────────────────────────────────────
  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: "3.17.0"

      - name: Helm lint
        run: helm lint deploy/helm/

      - name: Helm template validation
        run: |
          helm template zs-fhir-engine deploy/helm/ \
            --set image.tag=test \
            --dry-run

  # ── Release ───────────────────────────────────────────────────────────────
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: [build, helm-lint]

    if: github.ref == 'refs/heads/main'

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install semantic-release
        run: |
          npm install -g \
            semantic-release \
            @semantic-release/changelog \
            @semantic-release/git \
            @semantic-release/exec

      - name: Run semantic-release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx semantic-release
